<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>요한계시록암기</title>
<script src="bible-data.js"></script>
<style>
  :root{
    --ink:#0B1220;
    --ink-2:#121B2E;
    --ink-3:#1B2740;
    --parchment:#F7F1E3;
    --parchment-dim:#EDE4CC;
    --gold:#C9A24B;
    --gold-bright:#E3C171;
    --blue:#3B6FE0;
    --blue-dim:#274A9E;
    --red:#D6453D;
    --line:rgba(201,162,75,0.18);
    --text-dim:rgba(247,241,227,0.55);
    --text-mid:rgba(247,241,227,0.78);
    --font-display:'Noto Serif KR','Nanum Myeongjo',serif;
    --font-body:'Noto Serif KR',serif;
    --font-ui:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
    --tabbar-h:64px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at 50% -10%, #16223C 0%, var(--ink) 55%, #070B14 100%);
    color:var(--parchment);
    font-family:var(--font-ui);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  @media (min-width:900px){
    #app{
      max-width:560px;
      box-shadow:0 0 80px rgba(0,0,0,0.5);
    }
  }

  /* ---------- 별 배경 ---------- */
  .stars{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 50%, transparent 51%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 30% 70%, rgba(255,255,255,0.35) 50%, transparent 51%),
      radial-gradient(1px 1px at 60% 40%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 90% 80%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,0.4) 50%, transparent 51%);
    background-size:100% 100%;
    opacity:0.7;
  }

  /* ---------- 상단 헤더 ---------- */
  header{
    padding:calc(18px + var(--safe-top)) 22px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    z-index:2;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand .mark{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--parchment);
  }
  .brand .mark .accent{color:var(--gold-bright);}
  .back-btn{
    width:36px;height:36px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.03);
    color:var(--gold-bright);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    cursor:pointer;
    transition:background .2s, transform .15s;
  }
  .back-btn:active{transform:scale(0.92);}
  .back-btn:hover{background:rgba(255,255,255,0.08);}
  .header-spacer{width:36px;height:36px;}
  .screen-title{
    font-family:var(--font-display);
    font-size:17px;
    color:var(--text-mid);
    font-weight:600;
  }

  main{
    flex:1;
    position:relative;
    z-index:2;
    padding:0 22px calc(28px + var(--tabbar-h) + var(--safe-bottom));
    display:flex;
    flex-direction:column;
  }

  /* ---------- 홈 화면 ---------- */
  .hero{
    padding:18px 4px 30px;
  }
  .hero .eyebrow{
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--gold);
    text-transform:uppercase;
    font-family:var(--font-ui);
    font-weight:600;
  }
  .hero h1{
    font-family:var(--font-display);
    font-size:30px;
    line-height:1.35;
    margin:10px 0 0;
    color:var(--parchment);
    font-weight:700;
  }
  .hero p{
    margin:12px 0 0;
    font-size:14px;
    line-height:1.7;
    color:var(--text-dim);
    font-family:var(--font-ui);
  }

  .seal-row{
    display:flex;
    gap:6px;
    margin-top:18px;
  }
  .seal-dot{
    width:9px;height:9px;
    border-radius:50%;
    border:1px solid var(--gold);
    background:transparent;
  }
  .seal-dot.filled{background:var(--gold);}

  .menu{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:6px;
  }
  .menu-card{
    position:relative;
    border:1px solid var(--line);
    background:linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.01));
    border-radius:18px;
    padding:20px 20px 18px;
    cursor:pointer;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
    text-align:left;
    -webkit-tap-highlight-color:transparent;
  }
  .menu-card:hover{border-color:rgba(201,162,75,0.45);background:linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.015));}
  .menu-card:active{transform:scale(0.985);}
  .menu-card .num{
    font-family:var(--font-display);
    font-size:13px;
    color:var(--gold);
    letter-spacing:0.06em;
  }
  .menu-card h3{
    font-family:var(--font-display);
    font-size:20px;
    margin:6px 0 6px;
    color:var(--parchment);
    font-weight:700;
  }
  .menu-card p{
    font-size:13px;
    color:var(--text-dim);
    line-height:1.6;
    margin:0;
    font-family:var(--font-ui);
  }
  .menu-card .arrow{
    position:absolute;
    right:20px;top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    font-size:18px;
    opacity:0.7;
  }

  /* ---------- 챕터 그리드 (범위 선택) ---------- */
  .panel-title{
    font-family:var(--font-display);
    font-size:19px;
    color:var(--parchment);
    margin:18px 0 4px;
    font-weight:700;
    text-align: center;
  }
  .panel-sub{
    font-size:13px;
    color:var(--text-dim);
    margin:0 0 16px;
    text-align: center;
  }
  .chip-row{
    display:flex;
    gap:8px;
    margin-bottom:22px;
  }
  .chip{
    flex:1;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.03);
    color:var(--text-mid);
    border-radius:12px;
    padding:11px 0;
    font-size:13.5px;
    font-weight:600;
    text-align:center;
    cursor:pointer;
    font-family:var(--font-ui);
    transition:all .15s;
  }
  .chip.active{
    background:var(--gold);
    color:#1A1304;
    border-color:var(--gold);
  }
  .chip.disabled{opacity:0.3;pointer-events:none;}

  .chapter-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:9px;
    margin-bottom:14px;
  }
  .chapter-cell{
    aspect-ratio:1;
    border-radius:12px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.025);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    color:var(--text-mid);
    cursor:pointer;
    transition:all .15s;
    position:relative;
  }
  .chapter-cell.selected{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
  }
  .chapter-cell.empty{
    opacity:0.25;
    pointer-events:none;
    color:var(--text-dim);
  }
  .chapter-cell.empty::after{
    content:'';
    position:absolute;
    width:60%;height:1px;
    background:var(--text-dim);
    transform:rotate(-20deg);
  }

  .sticky-cta{
    margin-top:auto;
    padding-top:18px;
  }
  .btn-primary{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px 0;
    background:var(--gold);
    color:#1A1304;
    font-size:15.5px;
    font-weight:700;
    font-family:var(--font-ui);
    cursor:pointer;
    transition:transform .15s, background .15s;
    letter-spacing:0.01em;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{
    background:rgba(255,255,255,0.08);
    color:var(--text-dim);
    cursor:not-allowed;
  }
  .btn-secondary{
    width:100%;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 0;
    background:transparent;
    color:var(--text-mid);
    font-size:14.5px;
    font-weight:600;
    font-family:var(--font-ui);
    cursor:pointer;
    margin-top:10px;
  }

  /* ---------- 본문 읽기 화면 ---------- */
  .read-chapter-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
  }
  .nav-btn{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.03);
    color:var(--gold-bright);
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .nav-btn:disabled{opacity:0.25;cursor:default;}
  .chapter-pick-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:9px 18px;
    border:1px solid var(--line);
    border-radius:14px;
    background:rgba(255,255,255,0.035);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .chapter-pick-btn:active{ transform:scale(0.97); }
  .chapter-pick-num{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:700;
    color:var(--parchment);
  }
  .chapter-pick-caret{
    color:var(--gold-bright);
    font-size:13px;
  }
  .chapter-pick-select{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    border:none;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
  }
  .chapter-label{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:var(--font-display);
    font-size:18px;
    font-weight:700;
    color:var(--parchment);
    text-align:center;
    flex:1;
  }
  .chapter-label small{
    display:block;
    text-align:center;
    font-family:var(--font-ui);
    font-size:11.5px;
    font-weight:500;
    color:var(--text-dim);
    margin-top:2px;
  }

  .reader{
    background:linear-gradient(165deg, rgba(247,241,227,0.06), rgba(247,241,227,0.02));
    border:1px solid var(--line);
    border-radius:18px;
    padding:24px 20px 26px;
    font-family:var(--font-body);
    font-size:16.5px;
    line-height:2.05;
    color:rgba(247,241,227,0.92);
  }
  .reader .v{
    margin-right:5px;
  }
  .reader .vnum{
    font-family:var(--font-ui);
    font-size:11px;
    font-weight:700;
    color:var(--gold);
    vertical-align:super;
    margin-right:3px;
  }
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-dim);
  }
  .empty-state .glyph{
    font-size:34px;
    color:var(--gold);
    margin-bottom:14px;
  }
  .empty-state h4{
    font-family:var(--font-display);
    color:var(--parchment);
    font-size:17px;
    margin:0 0 8px;
  }
  .empty-state p{font-size:13px;line-height:1.7;margin:0;}
  .empty-state code{
    background:rgba(255,255,255,0.06);
    padding:2px 6px;
    border-radius:6px;
    font-size:12px;
    color:var(--gold-bright);
  }

  /* ---------- 시험 화면(공통) ---------- */
  .verse-block{
    margin-bottom:20px;
    padding-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .verse-block:last-child{border-bottom:none;}
  .verse-head{
    display:flex;align-items:center;gap:6px;
    margin-bottom:10px;
  }
  .verse-num{
    width:22px;height:22px;
    border-radius:50%;
    background:rgba(201,162,75,0.16);
    color:var(--gold-bright);
    font-size:11.5px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-ui);
  }
  .verse-text-line{
    font-family:var(--font-body);
    font-size:16px;
    line-height:2.15;
    color:rgba(247,241,227,0.95);
    word-break:keep-all;
  }
  .blank-input{
    display:inline-block;
    border:none;
    border-bottom:2px solid var(--text-dim);
    background:transparent;
    color:var(--parchment);
    font-family:var(--font-body);
    font-size:16px;
    text-align:center;
    padding:1px 2px 2px;
    margin:0 2px;
    outline:none;
    border-radius:0;
    min-width:2.6em;
  }
  .blank-input:focus{border-bottom-color:var(--gold-bright);}
  .blank-input.correct{
    color:var(--blue);
    border-bottom-color:var(--blue);
    font-weight:700;
  }
  .blank-input.wrong{
    border:1.5px solid var(--red);
    border-radius:6px;
    color:rgba(247,241,227,0.95);
  }
  .blank-input.wrong::placeholder{color:rgba(214,69,61,0.5);}

  /* 백지시험 textarea */
  .sentence-input{
    width:100%;
    margin-top:2px;
    background:rgba(255,255,255,0.035);
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:13px 14px;
    color:var(--parchment);
    font-family:var(--font-body);
    font-size:15.5px;
    line-height:1.8;
    resize:none;
    outline:none;
    box-sizing:border-box;
  }
  .sentence-input:focus{border-color:var(--gold);}
  .sentence-input.correct{
    border-color:var(--blue);
    color:var(--blue);
  }
  .sentence-input.wrong{
    border-color:var(--red);
  }
  .answer-reveal{
    margin-top:10px;
    padding:12px 14px;
    background:rgba(214,69,61,0.08);
    border-left:3px solid var(--red);
    border-radius:8px;
    font-size:14px;
    line-height:1.75;
    color:rgba(247,241,227,0.9);
    display:none;
  }
  .answer-reveal.show{display:block;}
  .answer-reveal.spacing-note{
    background:rgba(201,162,75,0.08);
    border-left-color:var(--gold);
  }
  .answer-reveal.spacing-note .label{ color:var(--gold-bright); }
  .answer-reveal .label{
    font-size:11px;
    font-weight:700;
    color:var(--red);
    letter-spacing:0.05em;
    margin-bottom:5px;
    font-family:var(--font-ui);
  }
  .diff-word{padding:0 1px;border-radius:3px;}
  .diff-word.bad{background:rgba(214,69,61,0.28);text-decoration:underline wavy rgba(214,69,61,0.7);}

  .score-banner{
    position:sticky;
    bottom:calc(var(--tabbar-h) + var(--safe-bottom) - 8px);
    margin-top:18px;
    padding-top:14px;
    background:linear-gradient(180deg, transparent, var(--ink) 28%);
    z-index:5;
  }
  .score-summary{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:10px;
    font-size:13px;
    color:var(--text-mid);
    font-family:var(--font-ui);
  }
  .score-summary b{color:var(--gold-bright);font-size:15px;}
  .btn-row{
    display:flex;
    gap:10px;
  }
  .btn-row .btn-primary, .btn-row .btn-ghost{flex:1;margin-top:0;}
  .btn-ghost{
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 0;
    background:rgba(255,255,255,0.04);
    color:var(--text-mid);
    font-size:15px;
    font-weight:700;
    font-family:var(--font-ui);
    cursor:pointer;
  }
  .btn-ghost:active{transform:scale(0.98);}

  ::-webkit-scrollbar{width:0;height:0;}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- 하단 플로팅 탭바 ---------- */
  #tab-bar{
    position:fixed;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:100%;
    max-width:480px;
    height:calc(var(--tabbar-h) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    display:flex;
    align-items:stretch;
    background:rgba(11,18,32,0.86);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border-top:1px solid var(--line);
    z-index:50;
  }
  @media (min-width:900px){
    #tab-bar{ max-width:560px; }
  }
  .tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    padding:6px 0 2px;
    transition:color .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .tab-item.active{ color:var(--gold-bright); }
  .tab-item:active{ opacity:0.7; }
  .tab-icon{ display:flex; align-items:center; justify-content:center; }
  .tab-label{
    font-size:10.5px;
    font-weight:600;
    font-family:var(--font-ui);
    letter-spacing:0.01em;
  }

  /* ---------- 성경보기: 플로팅 이전/다음 버튼 ---------- */
  #read-floating-nav{
    position:fixed;
    left:50%;
    bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 14px);
    transform:translateX(-50%);
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    padding:0 22px;
    pointer-events:none;
    z-index:40;
  }
  @media (min-width:900px){
    #read-floating-nav{ max-width:560px; }
  }
  .float-nav-btn{
    pointer-events:auto;
    width:50px;height:50px;
    border-radius:50%;
    border:1px solid rgba(201,162,75,0.35);
    background:rgba(18,27,46,0.92);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    color:var(--gold-bright);
    font-size:22px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    transition:transform .15s, opacity .15s;
  }
  .float-nav-btn:active{ transform:scale(0.92); }
  .float-nav-btn:disabled{ opacity:0.25; pointer-events:none; }

  /* ---------- 시험 화면: 범위 변경 바 ---------- */
  .scope-bar{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.035);
    border-radius:12px;
    padding:11px 14px;
    margin-bottom:18px;
    cursor:pointer;
    font-family:var(--font-ui);
  }
  .scope-bar-range{
    font-size:13.5px;
    font-weight:700;
    color:var(--parchment);
  }
  .scope-bar-edit{
    font-size:12.5px;
    color:var(--gold-bright);
    font-weight:600;
  }


  @media (prefers-reduced-motion: reduce){
    .fade-in{animation:none;}
  }
</style>
</head>
<body>
<div class="stars"></div>
<div id="app">
  <header>
    <div id="header-left" class="header-spacer"></div>
    <div id="header-title" class="brand">
      <span class="mark">요한계시록<span class="accent">암기</span></span>
    </div>
    <div class="header-spacer"></div>
  </header>
  <main id="main"></main>
</div>

<script>
/* =========================================================
   요한계시록암기 — 상태 & 라우팅
   ========================================================= */
const TOTAL_CHAPTERS = 22;

const state = {
  screen:'read',         // read | wordtest | blanktest | scope
  scopeReturnTo:null,    // scope 화면에서 시작하기 누르면 돌아갈 시험 화면 ('wordtest'|'blanktest')
  mode:null,             // 'word' | 'blank'  (단어시험/백지시험 중 어떤 탭인지)
  difficulty:'normal',   // easy | normal | hard  (word test only)
  selectedChapters:[1],  // array of chapter numbers (기본값: 1장)
  readChapter:1,
  graded:false,
};

/* =========================================================
   시험 화면 상단 "범위 변경" 바 (단어시험/백지시험 공통)
   ========================================================= */
function renderScopeBarHTML(){
  const chs = state.selectedChapters;
  const rangeLabel = chs.length===0 ? '범위 미선택'
    : chs.length===1 ? `${chs[0]}장`
    : `${chs[0]}장 외 ${chs.length-1}개`;
  const diffLabel = { easy:'쉬움', normal:'보통', hard:'어려움' }[state.difficulty];
  const showDiff = state.screen==='wordtest';
  return `
    <button class="scope-bar" onclick="openScope()">
      <span class="scope-bar-range">${rangeLabel}${showDiff ? ' · '+diffLabel : ''}</span>
      <span class="scope-bar-edit">범위 변경 ›</span>
    </button>
  `;
}

function hasChapterText(ch){
  return Array.isArray(REVELATION[ch]) && REVELATION[ch].length>0;
}

function render(){
  const main = document.getElementById('main');
  const headerLeft = document.getElementById('header-left');
  const headerTitle = document.getElementById('header-title');
  main.innerHTML='';
  headerLeft.innerHTML='';
  headerLeft.className='header-spacer';

  if(state.screen==='scope'){
    headerLeft.className='back-btn';
    headerLeft.innerHTML='‹';
    headerLeft.onclick=goBack;
    headerTitle.innerHTML = `<span class="screen-title">범위 선택</span>`;
    renderScope(main);
    hideReadFloatingNav();
  } else {
    headerTitle.innerHTML = `<span class="mark">요한계시록&nbsp;<span class="accent">암기</span></span>`;
    if(state.screen==='read') renderRead(main);
    if(state.screen==='wordtest'){ renderWordTest(main); hideReadFloatingNav(); }
    if(state.screen==='blanktest'){ renderBlankTest(main); hideReadFloatingNav(); }
  }

  renderTabBar();
}

function hideReadFloatingNav(){
  const nav = document.getElementById('read-floating-nav');
  if(nav) nav.style.display='none';
}

function goBack(){
  if(state.screen==='scope'){
    state.screen = state.scopeReturnTo || 'wordtest';
  }
  render();
}

/* =========================================================
   하단 플로팅 탭바
   ========================================================= */
function renderTabBar(){
  let bar = document.getElementById('tab-bar');
  if(!bar){
    bar = document.createElement('div');
    bar.id='tab-bar';
    document.getElementById('app').appendChild(bar);
  }
  const tabs = [
    { key:'read', label:'성경보기', icon: tabIconBook },
    { key:'wordtest', label:'단어시험', icon: tabIconWord },
    { key:'blanktest', label:'백지시험', icon: tabIconBlank },
  ];
  // scope 화면일 때는 그 직전에 있던 시험 탭이 활성 표시되도록
  const activeKey = state.screen==='scope' ? (state.scopeReturnTo||'wordtest') : state.screen;
  bar.innerHTML = tabs.map(t=>`
    <button class="tab-item ${activeKey===t.key?'active':''}" onclick="goTab('${t.key}')">
      <span class="tab-icon">${t.icon(activeKey===t.key)}</span>
      <span class="tab-label">${t.label}</span>
    </button>
  `).join('');
}

function goTab(key){
  if(key==='read'){
    state.screen='read';
  } else {
    // 단어시험/백지시험 탭: 마지막에 풀던 장(또는 기본값 1장)으로 바로 시험 화면 진입
    state.mode = key==='wordtest' ? 'word' : 'blank';
    if(state.selectedChapters.length===0) state.selectedChapters=[1];
    state.graded=false;
    wordTestData=null;
    blankTestData=null;
    state.screen = key;
  }
  render();
}

/* ---- 탭 아이콘 (SVG, 활성/비활성 색상은 currentColor로 CSS에서 제어) ---- */
function tabIconBook(active){
  return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 5.5C4 4.67 4.67 4 5.5 4H11V20H5.5C4.67 20 4 19.33 4 18.5V5.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="${active?'currentColor':'none'}" fill-opacity="${active?'0.18':'0'}"/>
    <path d="M20 5.5C20 4.67 19.33 4 18.5 4H13V20H18.5C19.33 20 20 19.33 20 18.5V5.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="${active?'currentColor':'none'}" fill-opacity="${active?'0.18':'0'}"/>
  </svg>`;
}
function tabIconWord(active){
  return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3.5" y="5" width="17" height="14" rx="2" stroke="currentColor" stroke-width="1.6" fill="${active?'currentColor':'none'}" fill-opacity="${active?'0.12':'0'}"/>
    <path d="M7 10H10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M13 10H17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="0.5 2.6"/>

function tabIconBlank(active){
  return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="3.5" width="16" height="17" rx="2" stroke="currentColor" stroke-width="1.6" fill="${active?'currentColor':'none'}" fill-opacity="${active?'0.12':'0'}"/>
    <path d="M7.5 14.5L9 16L16.5 8.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

/* =========================================================
   범위 변경 진입점 (시험 화면 상단 버튼에서 호출)
   ========================================================= */
function openScope(){
  state.scopeReturnTo = state.screen; // wordtest 또는 blanktest
  state.mode = state.screen==='wordtest' ? 'word' : 'blank';
  state.screen='scope';
  render();
}

/* =========================================================
   범위 선택 화면 (장 + 난이도) — 단어시험/백지시험 전용 (다중 선택)
   ========================================================= */
function renderScope(main){
  const isWord = state.mode==='word';
  main.innerHTML = `
    <div class="fade-in">
      <div class="panel-title">${isWord?'단어시험':'백지시험'} 범위 선택</div>
      <div class="panel-sub">암송하고 싶은 장을 하나 이상 선택하세요.</div>

      ${isWord ? `
      <div class="chip-row" id="diff-row">
        <div class="chip" data-d="easy" onclick="setDifficulty('easy')">쉬움</div>
        <div class="chip active" data-d="normal" onclick="setDifficulty('normal')">보통</div>
        <div class="chip" data-d="hard" onclick="setDifficulty('hard')">어려움</div>
      </div>` : ''}

      <div class="chapter-grid" id="chapter-grid">
        ${Array.from({length:TOTAL_CHAPTERS},(_,i)=>i+1).map(ch=>{
          const empty = !hasChapterText(ch);
          const sel = state.selectedChapters.includes(ch);
          return `<div class="chapter-cell ${empty?'empty':''} ${sel?'selected':''}" data-ch="${ch}" onclick="${empty?'':'toggleChapter('+ch+')'}">${ch}</div>`;
        }).join('')}
      </div>

      <div class="sticky-cta">
        <button class="btn-primary" id="start-btn" ${state.selectedChapters.length===0?'disabled':''} onclick="startTest()">
          ${state.selectedChapters.length>0 ? state.selectedChapters.length+'개 장으로 시작하기' : '장을 선택해주세요'}
        </button>
      </div>
    </div>
  `;
}

function setDifficulty(d){
  state.difficulty=d;
  document.querySelectorAll('#diff-row .chip').forEach(c=>c.classList.toggle('active', c.dataset.d===d));
}

function toggleChapter(ch){
  const idx = state.selectedChapters.indexOf(ch);
  if(idx>=0) state.selectedChapters.splice(idx,1);
  else state.selectedChapters.push(ch);
  state.selectedChapters.sort((a,b)=>a-b);
  render();
}

function startTest(){
  if(state.selectedChapters.length===0) return;
  state.graded=false;
  // 이전에 다른 장으로 풀었던 캐시 데이터가 남아있으면 새 선택이 무시되므로,
  // 새 시험을 시작할 때마다 캐시를 비워 항상 현재 선택한 장으로 다시 만든다.
  wordTestData = null;
  blankTestData = null;
  state.screen = state.scopeReturnTo || (state.mode==='word' ? 'wordtest' : 'blanktest');
  render();
}

/* =========================================================
   성경보기 화면
   ========================================================= */
function renderRead(main){
  const ch = state.readChapter;
  const verses = getVerses(ch);
  const chapterOrder = Array.from({length:TOTAL_CHAPTERS}, (_,i)=>i+1);
  const idx = chapterOrder.indexOf(ch);
  const prevCh = idx>0 ? chapterOrder[idx-1] : null;
  const nextCh = idx<chapterOrder.length-1 ? chapterOrder[idx+1] : null;

  main.innerHTML = `
    <div class="fade-in">
      <div class="read-chapter-nav">
        <div class="chapter-pick-btn">
          <span class="chapter-pick-num">${ch}장</span>
          <select class="chapter-pick-select" id="chapter-pick-select" onchange="changeReadChapter(this.value)" aria-label="장 선택">
            ${chapterOrder.map(c=>`<option value="${c}" ${c===ch?'selected':''} ${hasChapterText(c)?'':'disabled'}>${c}장${hasChapterText(c)?'':' (본문 없음)'}</option>`).join('')}
          </select>
        </div>
      </div>
      ${verses.length===0 ? emptyStateHTML(ch) : `
        <div class="reader">
          ${verses.map((v,i)=>`<span class="v"><span class="vnum">${i+1}</span>${escapeHTML(v)} </span>`).join('')}
        </div>
      `}
      <div style="height:64px"></div>
    </div>
  `;

  renderReadFloatingNav(prevCh, nextCh);
}

function renderReadFloatingNav(prevCh, nextCh){
  let nav = document.getElementById('read-floating-nav');
  if(!nav){
    nav = document.createElement('div');
    nav.id='read-floating-nav';
    document.getElementById('app').appendChild(nav);
  }
  nav.innerHTML = `
    <button class="float-nav-btn" ${prevCh===null?'disabled':''} onclick="changeReadChapter(${prevCh})" aria-label="이전 장">‹</button>
    <button class="float-nav-btn" ${nextCh===null?'disabled':''} onclick="changeReadChapter(${nextCh})" aria-label="다음 장">›</button>
  `;
  nav.style.display = state.screen==='read' ? 'flex' : 'none';
}

function changeReadChapter(ch){
  if(ch===null || ch===undefined || ch==='') return;
  state.readChapter = Number(ch);
  render();
}

function emptyStateHTML(ch){
  return `
    <div class="empty-state">
      <div class="glyph">✦</div>
      <h4>${ch}장 본문이 아직 비어 있습니다</h4>
      <p><code>bible-data.js</code> 파일의 <code>${ch}: [...]</code> 자리에<br/>본문을 절 단위로 채워주세요.</p>
    </div>
  `;
}

/* =========================================================
   유틸: 단어 분리 / HTML escape
   ========================================================= */
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// bible-data.js에 절 번호(예: "1 ", "12 ")가 실수로 맨 앞에 남아있을 경우 자동으로 제거.
// 본문 내용 중간의 숫자(예: "일곱 영")는 건드리지 않고, 문장 맨 앞의 "숫자+공백" 패턴만 제거한다.
function stripLeadingVerseNumber(sentence){
  return String(sentence).replace(/^\s*\d{1,3}\s+/, '');
}

function getVerse(ch, idx){
  const raw = (REVELATION[ch] || [])[idx] || '';
  return stripLeadingVerseNumber(raw);
}

function getVerses(ch){
  return (REVELATION[ch] || []).map(stripLeadingVerseNumber);
}

// 띄어쓰기 기준으로 단어 토큰화 (공백도 별도 토큰으로 유지해 순서를 보존)
function tokenize(sentence){
  return sentence.split(' ');
}

// 정규화: 비교 시 양끝 공백 제거, 일부 구두점 차이는 무시하지 않음(단어시험 요구사항상 정확히 비교)
function normalizeWord(w){
  return (w||'').trim();
}

/* =========================================================
   단어시험
   ========================================================= */
const DIFFICULTY_RATIO = { easy:0.2, normal:0.4, hard:0.65 };

// 시드 기반 간단 난수 (장+절+단어 인덱스로 고정되어, 다시 렌더링해도 같은 빈칸 유지)
function seededRandom(seed){
  let x = Math.sin(seed)*10000;
  return x - Math.floor(x);
}

let wordTestData = null; // { chapters: [{ch, verses:[{text, tokens:[{word, isBlank}]}]}] }

function buildWordTestData(){
  const ratio = DIFFICULTY_RATIO[state.difficulty];
  const chapters = state.selectedChapters.map(ch=>{
    const verses = getVerses(ch).map((sentence, vi)=>{
      const tokens = tokenize(sentence);
      const wordIndices = tokens.map((t,i)=>i).filter(i=>tokens[i].trim().length>0);
      const blankCount = Math.max(1, Math.round(wordIndices.length*ratio));
      // 시드 기반으로 셔플 후 앞에서 blankCount개를 빈칸으로 지정 (장,절 고정 시드)
      const seedBase = ch*1000+vi;
      const shuffled = [...wordIndices].sort((a,b)=>seededRandom(seedBase+a)-seededRandom(seedBase+b));
      const blankSet = new Set(shuffled.slice(0, blankCount));
      return {
        sentence,
        tokens: tokens.map((word,i)=>({ word, isBlank: blankSet.has(i) }))
      };
    });
    return { ch, verses };
  });
  return { chapters };
}

function renderWordTest(main){
  if(!wordTestData) wordTestData = buildWordTestData();
  const data = wordTestData;

  let blankCounter = 0;
  const blocksHTML = data.chapters.map(chap=>{
    const verseBlocks = chap.verses.map((v, vi)=>{
      const verseId = `wv-${chap.ch}-${vi}`;
      const lineHTML = v.tokens.map((tok)=>{
        if(tok.word.trim().length===0) return ' ';
        if(tok.isBlank){
          const id = `wb-${chap.ch}-${vi}-${blankCounter++}`;
          return `<input type="text" class="blank-input" id="${id}" data-answer="${escapeHTML(tok.word)}" data-verse-id="${verseId}" autocomplete="off" autocapitalize="off" spellcheck="false" style="width:${Math.max(2.4, tok.word.length*0.95)}em" />`;
        }
        return `<span>${escapeHTML(tok.word)}</span>`;
      }).join(' ');
      return `
        <div class="verse-block" data-verse-id="${verseId}" data-sentence="${escapeHTML(v.sentence)}">
          <div class="verse-head"><span class="verse-num">${vi+1}</span></div>
          <div class="verse-text-line">${lineHTML}</div>
          <div class="answer-reveal" id="${verseId}-reveal"></div>
        </div>
      `;
    }).join('');
    return `
      <div class="chapter-label" style="text-align:left;margin:18px 0 10px;">요한계시록 ${chap.ch}장<small>${CHAPTER_TITLES[chap.ch]||''}</small></div>
      ${verseBlocks}
    `;
  }).join('');

  main.innerHTML = `
    <div class="fade-in">
      ${renderScopeBarHTML()}
      ${blocksHTML}
      <div class="score-banner">
        ${state.graded ? `<div class="score-summary" id="word-score"></div>` : ''}
        <div class="btn-row">
          ${state.graded ? `
            <button class="btn-ghost" onclick="resetWordTest()">다시</button>
            <button class="btn-primary" onclick="gradeWordTest()">채점하기</button>
          ` : `
            <button class="btn-primary" onclick="gradeWordTest()" style="width:100%">채점하기</button>
          `}
        </div>
      </div>
    </div>
  `;

  if(state.graded) updateWordScoreSummary();
}

function gradeWordTest(){
  const inputs = document.querySelectorAll('.blank-input');
  let correct=0, total=inputs.length;
  const verseHasWrong = {}; // verseId -> boolean

  inputs.forEach(inp=>{
    const answer = normalizeWord(inp.dataset.answer);
    const given = normalizeWord(inp.value);
    const verseId = inp.dataset.verseId;
    inp.classList.remove('correct','wrong');
    if(given.length>0 && given===answer){
      inp.classList.add('correct');
      inp.disabled=true;
      correct++;
    } else {
      inp.classList.add('wrong');
      verseHasWrong[verseId] = true;
    }
  });

  // 절 안에 틀린 빈칸이 하나라도 있으면 그 절 아래에 원문 전체를 보여준다.
  document.querySelectorAll('.verse-block').forEach(block=>{
    const verseId = block.dataset.verseId;
    const revealEl = document.getElementById(verseId+'-reveal');
    if(!revealEl) return;
    if(verseHasWrong[verseId]){
      revealEl.innerHTML = `<div class="label">원문</div>${escapeHTML(block.dataset.sentence)}`;
      revealEl.classList.add('show');
    } else {
      revealEl.classList.remove('show');
      revealEl.innerHTML='';
    }
  });

  state.graded=true;
  state.wordScore = {correct, total};
  // re-render banner area only
  const banner = document.querySelector('.score-banner');
  banner.innerHTML = `
    <div class="score-summary" id="word-score"><b>${correct}</b> / ${total} 단어 정답</div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="resetWordTest()">다시</button>
      <button class="btn-primary" onclick="gradeWordTest()">채점하기</button>
    </div>
  `;
}

function updateWordScoreSummary(){
  const el = document.getElementById('word-score');
  if(el && state.wordScore) el.innerHTML = `<b>${state.wordScore.correct}</b> / ${state.wordScore.total} 단어 정답`;
}

function resetWordTest(){
  state.graded=false;
  wordTestData = buildWordTestData(); // 빈칸을 새로 비움 (입력 초기화)
  render();
}

/* =========================================================
   백지시험
   ========================================================= */
let blankTestData = null; // {chapters:[{ch, verses:[sentence,...]}]}

function buildBlankTestData(){
  const chapters = state.selectedChapters.map(ch=>({
    ch, verses: getVerses(ch)
  }));
  return { chapters };
}

function renderBlankTest(main){
  if(!blankTestData) blankTestData = buildBlankTestData();
  const data = blankTestData;

  const blocksHTML = data.chapters.map(chap=>{
    const verseBlocks = chap.verses.map((sentence, vi)=>{
      const id = `bt-${chap.ch}-${vi}`;
      return `
        <div class="verse-block">
          <div class="verse-head"><span class="verse-num">${vi+1}</span></div>
          <textarea class="sentence-input" id="${id}" data-answer="${escapeHTML(sentence)}" rows="2" placeholder="이 절을 그대로 적어보세요" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')event.preventDefault();"></textarea>
          <div class="answer-reveal" id="${id}-reveal"></div>
        </div>
      `;
    }).join('');
    return `
      <div class="chapter-label" style="text-align:left;margin:18px 0 10px;">요한계시록 ${chap.ch}장<small>${CHAPTER_TITLES[chap.ch]||''}</small></div>
      ${verseBlocks}
    `;
  }).join('');

  main.innerHTML = `
    <div class="fade-in">
      ${renderScopeBarHTML()}
      ${blocksHTML}
      <div class="score-banner">
        ${state.graded ? `<div class="score-summary" id="blank-score"></div>` : ''}
        <div class="btn-row">
          ${state.graded ? `
            <button class="btn-ghost" onclick="resetBlankTest()">다시</button>
            <button class="btn-primary" onclick="gradeBlankTest()">채점하기</button>
          ` : `
            <button class="btn-primary" onclick="gradeBlankTest()" style="width:100%">채점하기</button>
          `}
        </div>
      </div>
    </div>
  `;
  if(state.graded) updateBlankScoreSummary();
}

// 두 문장을 단어 단위로 비교해 다른 부분을 찾아낸다.
// LCS(최장 공통 부분열)로 정렬하여, 중간에 한 단어가 추가/누락/변경되어도
// 그 뒤의 멀쩍한 단어들까지 전부 오답으로 표시되지 않도록 한다.
//
// 정답 판정은 "띄어쓰기를 무시한 글자 비교"로 한다 (요청사항: 띄어쓰기가 달라도 정답 처리).
// 다만 띄어쓰기가 어디서 갈렸는지는 아래 원문 표시에서 계속 보여준다.
function normalizeForGrading(sentence){
  return String(sentence).replace(/\s+/g, '');
}

function diffSentences(correctSentence, userSentence){
  const c = correctSentence.split(' ');
  const u = userSentence.split(' ');
  const n = c.length, m = u.length;
  const dp = Array.from({length:n+1}, ()=> new Array(m+1).fill(0));
  for(let i=1;i<=n;i++){
    for(let j=1;j<=m;j++){
      dp[i][j] = (c[i-1]===u[j-1]) ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }
  const matched = new Array(n).fill(false);
  let i=n, j=m;
  while(i>0 && j>0){
    if(c[i-1]===u[j-1]){ matched[i-1]=true; i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  // 띄어쓰기를 무시했을 때 글자가 완전히 일치하면 정답으로 처리한다.
  const allMatch = normalizeForGrading(correctSentence) === normalizeForGrading(userSentence);
  // 단어 단위 표시는 기존처럼 LCS로 다른 부분만 짚어준다 (띄어쓰기 차이도 여기서 드러남).
  const wordsExactlyMatch = (n===m) && matched.every(Boolean);
  const correctRendered = c.map((word,idx)=>`<span class="diff-word ${matched[idx]?'':'bad'}">${escapeHTML(word)}</span>`);
  return { allMatch, wordsExactlyMatch, correctHTML: correctRendered.join(' ') };
}

function gradeBlankTest(){
  const textareas = document.querySelectorAll('.sentence-input');
  let correct=0, total=textareas.length;
  textareas.forEach(ta=>{
    const answer = ta.dataset.answer;
    const given = ta.value.replace(/\n/g,' ');
    ta.classList.remove('correct','wrong');
    const { allMatch, wordsExactlyMatch, correctHTML } = diffSentences(answer, given);
    const revealEl = document.getElementById(ta.id+'-reveal');
    if(allMatch && given.trim().length>0){
      ta.classList.add('correct');
      ta.disabled=true;
      correct++;
      if(wordsExactlyMatch){
        // 띄어쓰기까지 완전히 같으면 원문을 따로 보여줄 필요 없음
        revealEl.classList.remove('show','spacing-note');
        revealEl.innerHTML='';
      } else {
        // 글자는 맞았지만(=정답 처리) 띄어쓰기가 달랐던 경우, 어디가 달랐는지는 계속 보여준다.
        revealEl.innerHTML = `<div class="label">띄어쓰기 차이</div>${correctHTML}`;
        revealEl.classList.add('show','spacing-note');
      }
    } else {
      ta.classList.add('wrong');
      revealEl.classList.remove('spacing-note');
      revealEl.innerHTML = `<div class="label">정답</div>${correctHTML}`;
      revealEl.classList.add('show');
    }
  });
  state.graded=true;
  state.blankScore={correct,total};
  const banner = document.querySelector('.score-banner');
  banner.innerHTML = `
    <div class="score-summary" id="blank-score"><b>${correct}</b> / ${total} 절 정답</div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="resetBlankTest()">다시</button>
      <button class="btn-primary" onclick="gradeBlankTest()">채점하기</button>
    </div>
  `;
}

function updateBlankScoreSummary(){
  const el = document.getElementById('blank-score');
  if(el && state.blankScore) el.innerHTML = `<b>${state.blankScore.correct}</b> / ${state.blankScore.total} 절 정답`;
}

function resetBlankTest(){
  state.graded=false;
  render();
  document.querySelectorAll('.sentence-input').forEach(ta=>{
    ta.value='';
    ta.disabled=false;
    ta.classList.remove('correct','wrong');
  });
  document.querySelectorAll('.answer-reveal').forEach(r=>r.classList.remove('show','spacing-note'));
}

/* =========================================================
   init
   ========================================================= */
render();
</script>
</body>
